<div class="controls-container">
    <div class="font-control">
        <label for="fontSlider">Font Size:</label>
        <input type="range" id="fontSlider" class="font-slider" min="8" max="80" value="16" step="1" />
        <span id="fontSizeDisplay" class="font-size-display">16px</span>
    </div>

    <div class="size-control">
        <label for="sizeDropdown">Density:</label>
        <select id="sizeDropdown" class="size-dropdown">
            <option value="compact">Compact</option>
            <option selected value="default">Default</option>
        </select>
    </div>
</div>

<script>
    const slider = document.getElementById('fontSlider');
    const display = document.getElementById('fontSizeDisplay');

    slider.addEventListener('input', function () {
        console.log('Slider value:', this.value);
        const fontSize = this.value + 'px';

        document.documentElement.style.fontSize = fontSize;

        display.textContent = fontSize;
    });
</script>
<script>
    window.onload = function () {
        document.body.classList.add('ix-body');
        const sizeDropdown = document.getElementById('sizeDropdown');

        sizeDropdown.addEventListener('change', function () {

            if (this.value) {
                document.body.setAttribute('data-density', this.value);
            } else {
                document.body.removeAttribute('data-density');
            }
        });
    };
</script>
