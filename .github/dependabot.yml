version: 2
updates:
    - package-ecosystem: 'npm'
      directory: '/'
      schedule:
          interval: 'weekly'
          day: 'monday'
          time: '06:00'
      cooldown:
          default-days: 7
          semver-major-days: 30
      open-pull-requests-limit: 10
      groups:
          minor-and-patch:
              update-types:
                  - 'minor'
                  - 'patch'

    - package-ecosystem: 'github-actions'
      directory: '/'
      schedule:
          interval: 'weekly'
          day: 'monday'
          time: '06:00'
      cooldown:
          default-days: 7
