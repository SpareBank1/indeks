name: Release - Opprett versjons-PR eller publiser

on:
    push:
        branches:
            - main

concurrency:
    group: release
    cancel-in-progress: false

jobs:
    release:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: write
            pull-requests: write
            id-token: write
        steps:
            - name: Checkout code
              # zizmor: ignore[artipacked] - persist-credentials trengs for git push av tags og branch
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0

            - name: Install pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

            - name: Set up Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
              with:
                  node-version: '24'
                  cache: 'pnpm'
                  registry-url: 'https://registry.npmjs.org'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --ignore-scripts

            - name: Opprett versjons-PR eller publiser
              uses: dotansimha/changesets-action@069996e9be15531bd598272996fa23853d61590e # v1.5.2
              with:
                  version: pnpm ci:version
                  publish: pnpm ci:publish
                  createGithubReleases: aggregate
                  commit: 'chore: version packages'
                  title: 'chore: version packages'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_TOKEN: '' # https://github.com/changesets/changesets/issues/1152#issuecomment-3190884868
                  NPM_CONFIG_PROVENANCE: 'true'

