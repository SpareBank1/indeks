name: Release - Opprett versjons-PR eller publiser

on:
    push:
        branches:
            - main

concurrency:
    group: release
    cancel-in-progress: false

jobs:
    release:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: write
            pull-requests: write
            id-token: write
        steps:
            - name: Checkout code
              # zizmor: ignore[artipacked] - persist-credentials trengs for git push av tags og branch
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  fetch-depth: 0

            - name: Install pnpm
              uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6.0.1

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: '24'
                  cache: 'pnpm'
                  registry-url: 'https://registry.npmjs.org'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --ignore-scripts

            - name: Opprett versjons-PR eller publiser
              uses: dotansimha/changesets-action@069996e9be15531bd598272996fa23853d61590e # v1.5.2
              with:
                  version: pnpm ci:version
                  publish: pnpm ci:publish
                  createGithubReleases: aggregate
                  commit: 'chore: version packages'
                  title: 'chore: version packages'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_TOKEN: '' # https://github.com/changesets/changesets/issues/1152#issuecomment-3190884868
                  NPM_CONFIG_PROVENANCE: 'true'

