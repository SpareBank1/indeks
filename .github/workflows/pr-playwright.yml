name: PR - Playwright-tester

on:
    pull_request:
        branches: [main]
        paths:
            - 'indeks-react/**'
            - 'indeks-css/**'
            - 'indeks-tokens/**'

concurrency:
    group: playwright-${{ github.head_ref || github.ref }}
    cancel-in-progress: true

jobs:
    playwright-tests:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read
            pull-requests: read
        env:
            DOCKER_CACHE_DIR: /tmp/.buildx-cache

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false

            - name: Install pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

            - name: Set up Node.js
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
              with:
                  node-version: '24'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --ignore-scripts

            - name: Build tokens
              run: pnpm run build
              working-directory: ./indeks-tokens

            # Set up Docker Buildx, which enables advanced Docker features like layer caching.
            # This is required for the next steps to cache and reuse Docker image layers between builds.
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

            # Cache Docker build layers to speed up future builds.
            # The 'key' is now based only on pnpm-lock.yaml, so the image is rebuilt only when dependencies change.
            # This works because other files are mounted at runtime and do not require a rebuild.
            - name: Mellomlagre Docker-lag
              uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
              with:
                  path: ${{ env.DOCKER_CACHE_DIR }}
                  key: ${{ runner.os }}-buildx-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-buildx-

            # Build the Docker image for indeks-react, using the cache for efficiency.
            # The image will only be rebuilt when pnpm-lock.yaml changes.
            # 'context' points to the folder containing the Dockerfile.
            # 'tags' names the built image for later use.
            # 'cache-from' and 'cache-to' configure Docker to use the cached layers from the previous step.
            - name: Bygg Docker-image
              # zizmor: ignore[cache-poisoning] - docker image lastes kun lokalt med load: true, pushes ikke til registry
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
              with:
                  context: ./indeks-react
                  tags: indeks-react-playwright:latest
                  cache-from: type=local,src=${{ env.DOCKER_CACHE_DIR }}
                  cache-to: type=local,dest=${{ env.DOCKER_CACHE_DIR }},mode=max
                  load: true

            - name: Start Storybook i Docker (bakgrunn)
              working-directory: ./indeks-react
              run: |
                  docker run -d \
                    --name storybook \
                    --network host \
                    -e NODE_ENV=development \
                    -v "$(pwd)/lib:/app/lib:ro" \
                    -v "$(pwd)/../indeks-css:/indeks-css:ro" \
                    -v "$(pwd)/../indeks-tokens:/indeks-tokens:ro" \
                    -v "$(pwd)/package.json:/app/package.json:ro" \
                    -v "$(pwd)/.storybook:/app/.storybook:ro" \
                    -v "$(pwd)/tsconfig.json:/app/tsconfig.json:ro" \
                    -v "$(pwd)/vite.config.ts:/app/vite.config.ts:ro" \
                    indeks-react-playwright sh -c "npm run test:storybook"

            # Run Playwright tests using the Docker Compose setup.
            # This command uses the freshly built (or cached) Docker image to run your Playwright tests in a consistent environment.
            - name: Kjør Playwright-tester i Docker
              working-directory: ./indeks-react
              run: |
                  docker run --rm \
                    --name playwright \
                    --network host \
                    -e CI=1 \
                    -v "$(pwd)/tests:/app/tests:ro" \
                    -v "$(pwd)/lib:/app/lib:ro" \
                    -v "$(pwd)/package.json:/app/package.json:ro" \
                    -v "$(pwd)/tsconfig.json:/app/tsconfig.json:ro" \
                    -v "$(pwd)/vite.config.ts:/app/vite.config.ts:ro" \
                    -v "$(pwd)/vitest.config.ts:/app/vitest.config.ts:ro" \
                    -v "$(pwd)/playwright-report:/app/playwright-report:rw" \
                    -v "$(pwd)/test-results:/app/test-results:rw" \
                    indeks-react-playwright \
                    sh -c "echo 'Waiting for Storybook to be ready...'; \
                      attempts=0; max_attempts=5; \
                      until curl -f http://localhost:9009 >/dev/null 2>&1; do \
                        attempts=\$((attempts + 1)); \
                        if [ \$attempts -gt \$max_attempts ]; then \
                          echo 'Storybook failed to start after '\$max_attempts' attempts'; \
                          exit 1; \
                        fi; \
                        echo 'Storybook not ready yet, waiting... (attempt '\$attempts'/'\$max_attempts')'; \
                        sleep 2; \
                      done; \
                      echo 'Storybook is ready! Starting Playwright tests...'; \
                      npx playwright test --config=tests/playwright.config.ts"

            - name: Last opp Playwright-rapport
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
              if: always()
              with:
                  name: playwright-report
                  path: indeks-react/playwright-report/
                  retention-days: 30

            - name: Last opp testresultater
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
              if: always()
              with:
                  name: test-results
                  path: indeks-react/test-results/
                  retention-days: 30

            - name: Rydd opp Storybook-container
              if: always()
              run: |
                  docker stop storybook || true
                  docker rm storybook || true
