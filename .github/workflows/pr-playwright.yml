name: PR - Playwright-tester

on:
    pull_request:
        branches: [main]
        paths:
            - 'indeks-storybook/**'
            - 'indeks-react/**'
            - 'indeks-web/**'
            - 'indeks-css/**'
            - 'indeks-tokens/**'

concurrency:
    group: playwright-${{ github.head_ref || github.ref }}
    cancel-in-progress: true

jobs:
    playwright-tests:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read
            pull-requests: read

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false

            - name: Install pnpm
              uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6.0.1

            - name: Set up Node.js
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
              with:
                  node-version: '24'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --ignore-scripts

            - name: Build Storybook (med avhengigheter)
              run: pnpm build-storybook

            - name: Run Playwright tests in Docker
              working-directory: ./indeks-storybook
              run: docker compose run --rm playwright

            - name: Last opp Playwright-rapport
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: always()
              with:
                  name: playwright-report
                  path: indeks-storybook/playwright-report/
                  retention-days: 30

            - name: Last opp testresultater
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: always()
              with:
                  name: test-results
                  path: indeks-storybook/test-results/
                  retention-days: 30
