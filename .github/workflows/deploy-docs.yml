name: Deploy - Dokumentasjon

on:
    push:
        branches:
            - main
        paths:
            - 'indeks-docs/**'
            - 'indeks-react/**'
            - 'indeks-eksempel/**'
            - 'shared/**'
            - '.github/workflows/deploy-docs.yml'
    workflow_dispatch:
        inputs:
            commit:
                description: 'Commit SHA or branch/tag to deploy (leave empty for latest)'
                required: false
                type: string

concurrency:
    group: deploy-docs
    cancel-in-progress: true

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  ref: ${{ github.event.inputs.commit || github.sha }}
                  persist-credentials: false

            - name: Install pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

            - name: Set up Node.js
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
              with:
                  node-version: '24'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --ignore-scripts

            - name: Build all packages
              run: pnpm build

            - name: Build Storybook
              run: pnpm build-storybook

            - name: Flytt til dist
              run: |
                  mkdir -p ./dist
                  mkdir -p ./dist/storybook
                  mkdir -p ./dist/eksempel
                  mv ./indeks-react/storybook-static/* ./dist/storybook
                  mv ./indeks-eksempel/dist/* ./dist/eksempel
                  cp -r ./indeks-docs/build/* ./dist/

            - name: Deploy til Azure
              uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
              with:
                  azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LIVELY_WATER_0D2FD1F03 }}
                  repo_token: ${{ secrets.GITHUB_TOKEN }}
                  action: 'upload'
                  app_location: './dist'
                  api_location: ''
                  output_location: ''
                  skip_app_build: true
                  production_branch: 'main'
