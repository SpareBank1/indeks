name: PR - Rydd opp forhåndsvisning

on:
    pull_request:
        types: [closed]
        branches:
            - main

jobs:
    cleanup:
        if: ${{ !github.event.pull_request.head.repo.fork }}
        runs-on: ubuntu-latest
        timeout-minutes: 5
        name: Slett forhåndsvisning
        permissions:
            contents: read
            pull-requests: write
        steps:
            - name: Slett Azure-forhåndsvisning
              id: closepullrequest
              uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
              with:
                  azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LIVELY_WATER_0D2FD1F03 }}
                  action: 'close'
