name: Sikkerhet - Zizmor workflow-skanning

on:
    pull_request:
        paths:
            - '.github/workflows/**'
            - '.github/zizmor.yml'
    push:
        branches:
            - main
        paths:
            - '.github/workflows/**'
            - '.github/zizmor.yml'
    workflow_dispatch:

permissions:
    contents: read

jobs:
    scan:
        name: Scan workflows
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - name: Kjør Zizmor sikkerhetsscanning
              run: |
                  docker run --rm --network none \
                    -v "${PWD}/.github:/repo/.github" \
                    ghcr.io/zizmorcore/zizmor:1.18.0 \
                    --offline --config /repo/.github/zizmor.yml /repo
