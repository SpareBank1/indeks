name: Release - Publiser til npm

on:
    release:
        types: [published]

concurrency:
    group: publish
    cancel-in-progress: false

jobs:
    publish:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  ref: ${{ github.event.release.tag_name }}
                  persist-credentials: false

            - name: Install pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

            - name: Set up Node.js
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
              with:
                  node-version: '24'
                  cache: 'pnpm'
                  registry-url: 'https://registry.npmjs.org'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --ignore-scripts

            - name: Build all packages
              run: |
                  echo "🏗️  Building packages..."
                  pnpm turbo run build --filter=@sb1/indeks-tokens --filter=@sb1/indeks-utils --filter=@sb1/indeks-css --filter=@sb1/indeks-react
                  echo "✨ Build complete!"

            - name: Publiser til npm
              run: |
                  echo "📦 Publishing packages to npm..."
                  pnpm changeset publish
              env:
                  NPM_CONFIG_PROVENANCE: true

            - name: Oppsummering
              env:
                  TAG_NAME: ${{ github.event.release.tag_name }}
              run: |
                  echo "## 📦 Published to npm" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "Release: ${TAG_NAME}" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
