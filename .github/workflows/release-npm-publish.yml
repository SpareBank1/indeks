name: Release - Publiser til npm

on:
    release:
        types: [published]

concurrency:
    group: publish
    cancel-in-progress: false

jobs:
    publish:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  ref: ${{ github.event.release.tag_name }}
                  persist-credentials: false

            - name: Setup pnpm
              uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: '24'
                  cache: 'pnpm'
                  registry-url: 'https://registry.npmjs.org'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --ignore-scripts

            - name: Build all packages
              run: |
                  echo "🏗️  Building packages..."
                  pnpm turbo run build --filter=@sb1/indeks-tokens --filter=@sb1/indeks-utils --filter=@sb1/indeks-css --filter=@sb1/indeks-react
                  echo "✨ Build complete!"

            - name: Publiser til npm
              run: |
                  echo "📦 Publishing packages to npm..."
                  pnpm changeset publish
              env:
                  NPM_CONFIG_PROVENANCE: true

            - name: Summary
              env:
                  TAG_NAME: ${{ github.event.release.tag_name }}
              run: |
                  echo "## 📦 Published to npm" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "Release: ${TAG_NAME}" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
