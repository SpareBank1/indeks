name: Release - Opprett versjons-PR

on:
    workflow_dispatch:

permissions: {}

concurrency:
    group: release
    cancel-in-progress: false

jobs:
    check:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: read
        timeout-minutes: 5
        outputs:
            should_run: ${{ steps.result.outputs.should_run }}
        steps:
            - name: Sjekk for eksisterende release-PR
              id: check_pr
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  REPO: ${{ github.repository }}
              run: |
                  OPEN_PRS=$(gh pr list --repo "$REPO" --head "release/" --state open --json number --jq 'length')
                  if [ "$OPEN_PRS" -gt 0 ]; then
                      echo "⏭️  Release PR already exists"
                      echo "exists=true" >> $GITHUB_OUTPUT
                  else
                      echo "exists=false" >> $GITHUB_OUTPUT
                  fi

            - name: Checkout code
              if: steps.check_pr.outputs.exists != 'true'
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false

            - name: Sjekk for changesets
              id: check_changesets
              if: steps.check_pr.outputs.exists != 'true'
              run: |
                  CHANGESETS=$(find .changeset -name "*.md" ! -name "README.md" 2>/dev/null | wc -l)
                  if [ "$CHANGESETS" -gt 0 ]; then
                      echo "✅ Found $CHANGESETS changeset(s)"
                      echo "has_changesets=true" >> $GITHUB_OUTPUT
                  else
                      echo "⏭️  No changesets found"
                      echo "has_changesets=false" >> $GITHUB_OUTPUT
                  fi

            - name: Sett resultat
              id: result
              env:
                  PR_EXISTS: ${{ steps.check_pr.outputs.exists }}
                  HAS_CHANGESETS: ${{ steps.check_changesets.outputs.has_changesets }}
              run: |
                  if [ "$PR_EXISTS" == "true" ]; then
                      echo "should_run=false" >> $GITHUB_OUTPUT
                  elif [ "$HAS_CHANGESETS" == "true" ]; then
                      echo "should_run=true" >> $GITHUB_OUTPUT
                  else
                      echo "should_run=false" >> $GITHUB_OUTPUT
                  fi

    version:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        needs: check
        if: needs.check.outputs.should_run == 'true'
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Checkout code
              # zizmor: ignore[artipacked] - persist-credentials trengs for git push av branch
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  fetch-depth: 0

            - name: Install pnpm
              uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

            - name: Set up Node.js
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
              with:
                  node-version: '24'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --ignore-scripts

            - name: Versjonér pakker
              id: version
              run: |
                  echo "📝 Updating version numbers..."
                  pnpm changeset version

                  if git diff --quiet; then
                      echo "has_changes=false" >> $GITHUB_OUTPUT
                      echo "⏭️  No version changes detected"
                  else
                      echo "has_changes=true" >> $GITHUB_OUTPUT
                      echo "✅ Version changes detected"
                  fi

            - name: Opprett release-branch
              id: branch
              if: steps.version.outputs.has_changes == 'true'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  BRANCH_NAME="release/$(date +%Y%m%d-%H%M%S)"
                  echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

                  # Finn hvilke pakker som ble oppdatert
                  UPDATED=""
                  TABLE_ROWS=""
                  for pkg in indeks-tokens indeks-utils indeks-css indeks-react; do
                      if git diff --name-only | grep -q "$pkg/package.json"; then
                          VERSION=$(node -p "require('./$pkg/package.json').version")
                          UPDATED="$UPDATED $pkg@$VERSION"
                          TABLE_ROWS="${TABLE_ROWS}| @sb1/${pkg} | ${VERSION} |\n"
                      fi
                  done
                  UPDATED=$(echo "$UPDATED" | xargs)

                  echo "table_rows<<EOF" >> $GITHUB_OUTPUT
                  echo -e "$TABLE_ROWS" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

                  git checkout -b "$BRANCH_NAME"
                  git add .
                  git commit -m "Release $UPDATED"
                  git push origin "$BRANCH_NAME"

            - name: Opprett pull request
              if: steps.version.outputs.has_changes == 'true'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TABLE_ROWS: ${{ steps.branch.outputs.table_rows }}
                  BRANCH_NAME: ${{ steps.branch.outputs.branch_name }}
              run: |
                  gh pr create \
                      --title "chore: version packages" \
                      --body "$(cat <<EOF
                  ## 📦 Release PR

                  | Package | Version |
                  |---------|---------|
                  ${TABLE_ROWS}
                  ---

                  ⚠️ **Denne PR-en må merges manuelt.**

                  Etter merge publiseres pakkene automatisk til npm.

                  Andre PR-er kan ikke merges før denne er merget.

                  EOF
                  )" \
                      --base main \
                      --head "$BRANCH_NAME"
