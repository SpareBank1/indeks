
services:
  storybook:
    build: .
    working_dir: /app
    volumes:
      # Only mount what Storybook needs
      - ./lib:/app/lib:ro
      - ../indeks-css:/indeks-css:ro
      - ../indeks-tokens:/indeks-tokens:ro
      - ./package.json:/app/package.json:ro
      - ./.storybook:/app/.storybook:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./vite.config.ts:/app/vite.config.ts:ro
    command: sh -c "npm run test:storybook"
    environment:
      - NODE_ENV=development
    network_mode: "host"

  playwright:
    build: .
    working_dir: /app
    volumes:
      # Only mount what Playwright needs
      - ./tests:/app/tests:ro
      - ./lib:/app/lib:ro
      - ./package.json:/app/package.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./vite.config.ts:/app/vite.config.ts:ro
      - ./vitest.config.ts:/app/vitest.config.ts:ro
      - ./playwright-report:/app/playwright-report:rw
    depends_on:
      - storybook
    environment:
      - CI=1
    command: >
      sh -c "
      echo 'Waiting for Storybook to be ready...';
      attempts=0;
      max_attempts=5;
      until curl -f http://localhost:9009 >/dev/null 2>&1; do
        attempts=\$((attempts + 1));
        if [ \$attempts -gt \$max_attempts ]; then
          echo 'Storybook failed to start after '\$max_attempts' attempts';
          exit 1;
        fi;
        echo 'Storybook not ready yet, waiting... (attempt '\$attempts'/'\$max_attempts')';
        sleep 2;
      done;
      echo 'Storybook is ready! Starting Playwright tests...';
      npx playwright test --config=tests/playwright.config.ts --workers 4
      "
    network_mode: "host"

  update-screenshots:    
    build: .
    working_dir: /app
    volumes:
      # Mount snapshot directory directly - no copying needed!
      - ./tests/scanAll.dtest.ts-snapshots:/app/tests/scanAll.dtest.ts-snapshots:rw
      - ./tests:/app/tests:ro
      - ./lib:/app/lib:ro
      - ./package.json:/app/package.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./vite.config.ts:/app/vite.config.ts:ro
      - ./vitest.config.ts:/app/vitest.config.ts:ro
    depends_on:
      - storybook
    environment:
      - CI=1
    command: >
      sh -c "
      echo 'Waiting for Storybook to be ready...';
      attempts=0;
      max_attempts=5;
      until curl -f http://localhost:9009 >/dev/null 2>&1; do
        attempts=\$((attempts + 1));
        if [ \$attempts -gt \$max_attempts ]; then
          echo 'Storybook failed to start after '\$max_attempts' attempts';
          exit 1;
        fi;
        echo 'Storybook not ready yet, waiting... (attempt '\$attempts'/'\$max_attempts')';
        sleep 2;
      done;
      echo 'Storybook is ready! Starting Playwright tests with screenshot updates...';
      npx playwright test --config=tests/playwright.config.ts --update-snapshots --workers 4;
      echo 'Screenshot update complete!'
      "
    network_mode: "host"

  cleanup:
    build: .
    working_dir: /app
    volumes:
      # Mount specific directories for cleanup
      - ./node_modules:/app/node_modules:rw
      - ./test-results:/app/test-results:rw
      - ./playwright-report:/app/playwright-report:rw
    command: >
      sh -c "
      echo 'Starting cleanup...';
      echo 'Removing node_modules...';
      rm -rf /app/node_modules 2>/dev/null || true;
      echo 'Removing test-results...';
      rm -rf /app/test-results 2>/dev/null || true;
      echo 'Removing playwright-report...';
      rm -rf /app/playwright-report 2>/dev/null || true;
      echo 'Cleanup complete!'
      "
